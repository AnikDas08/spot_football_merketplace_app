name: untitled
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  dio: ^5.7.0
  pretty_dio_logger: ^1.3.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.5
  mime: ^2.0.0
  socket_io_client: ^3.1.2
  cached_network_image: ^3.4.1
  intl_phone_field: ^3.2.0
  image_picker: ^1.1.2
  pin_code_fields: ^9.3.0
  intl: ^0.19.0
  flutter_html: ^3.0.0-beta.2
  flutter_dotenv: ^5.1.0
  dio_cookie_manager: ^3.1.2
  cookie_jar: ^4.0.8
  video_player: ^2.9.2
  shimmer: ^3.0.0
  path: ^1.9.0
  flutter_launcher_icons: ^0.14.4
  jwt_decode: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/launcher_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/temporary/
    - assets/icons/

  fonts:
    - family: SFPro
      fonts:
        - asset: assets/fonts/sf_pro/SFPRODISPLAYREGULAR.OTF
        - asset: assets/fonts/sf_pro/SFPRODISPLAYBOLD.OTF
          weight: 700
        - asset: assets/fonts/sf_pro/SFPRODISPLAYMEDIUM.OTF
          weight: 500
        - asset: assets/fonts/sf_pro/SFPRODISPLAYLIGHTITALIC.OTF
          style: italic
          weight: 300
